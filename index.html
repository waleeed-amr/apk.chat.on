<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat On | التحديث الرسمي</title>
    <meta name="theme-color" content="#0f172a">
    <meta name="description" content="البوابة الرسمية لتحميل وتحديث تطبيق Chat On.">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDEFqdUvl2xNqF4H0dbwSWrp5oVnwapxYE",
            authDomain: "app-loction-5.firebaseapp.com",
            projectId: "app-loction-5",
            storageBucket: "app-loction-5.firebasestorage.app",
            messagingSenderId: "979419346898",
            appId: "1:979419346898:web:a708b9c56ab54d7b763a0b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // إعدادات GitHub
        const GITHUB_REPO = 'waleeed-amr/apk.chat.on';
        const FALLBACK_DOWNLOAD = `https://github.com/${GITHUB_REPO}/releases/latest/download/app-release.apk`;

        window.db = db;
        window.doc = doc;
        window.getDoc = getDoc;
        window.FALLBACK_DOWNLOAD = FALLBACK_DOWNLOAD;
        window.GITHUB_REPO = GITHUB_REPO;
    </script>

    <style>
        :root {
            --bg-color: #0f172a;
            --primary: #10b981;
            --primary-glow: rgba(16, 185, 129, 0.4);
            --secondary: #3b82f6;
            --secondary-glow: rgba(59, 130, 246, 0.4);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            perspective: 1000px;
        }

        /* 🌌 Dynamic Background */
        .bg-shapes {
            position: absolute;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            z-index: 0;
            top: 0; left: 0;
        }

        .shape {
            position: absolute;
            filter: blur(80px);
            opacity: 0.6;
            animation: moveShape 15s infinite alternate ease-in-out;
        }

        .shape-1 { width: 40vw; height: 40vw; background: var(--primary-glow); top: -10%; right: -10%; }
        .shape-2 { width: 50vw; height: 50vw; background: var(--secondary-glow); bottom: -20%; left: -10%; animation-delay: -5s; }
        .shape-3 { width: 30vw; height: 30vw; background: rgba(139, 92, 246, 0.3); top: 40%; left: 40%; animation-duration: 20s; }

        @keyframes moveShape {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, -50px) scale(1.1); }
        }

        /* 💎 Glass Card */
        .glass-card {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 420px;
            background: var(--glass-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 3rem 2rem;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.4), inset 0 1px 0 rgba(255,255,255,0.1);
            transform: translateY(40px);
            opacity: 0;
            animation: slideUpFade 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            transition: transform 0.1s ease;
        }

        @keyframes slideUpFade {
            to { opacity: 1; transform: translateY(0); }
        }

        /* 🚀 Icon */
        .icon-container {
            width: 110px;
            height: 110px;
            margin: 0 auto 2rem;
            position: relative;
        }

        .icon-container::before {
            content: '';
            position: absolute;
            inset: -10px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 35px;
            filter: blur(20px);
            opacity: 0.6;
            animation: pulseGlow 3s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { opacity: 0.4; transform: scale(0.95); }
            100% { opacity: 0.8; transform: scale(1.05); }
        }

        .icon {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            color: white;
            box-shadow: inset 0 2px 0 rgba(255,255,255,0.2), 0 10px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* Typography */
        h1 {
            font-size: 2.2rem;
            font-weight: 900;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #fff, #cbd5e1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -1px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-bottom: 2.5rem;
            font-weight: 600;
        }

        /* 📊 Dynamic Status Area */
        .status-container {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            position: relative;
            overflow: hidden;
        }

        .version-badge {
            display: inline-block;
            background: rgba(16, 185, 129, 0.15);
            color: var(--primary);
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-weight: 800;
            font-size: 0.9rem;
            margin-bottom: 1rem;
            border: 1px solid rgba(16, 185, 129, 0.3);
            display: none;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .status-text {
            font-size: 1rem;
            font-weight: 600;
            color: #e2e8f0;
            line-height: 1.6;
        }

        .highlight { color: var(--primary); }

        /* Loader */
        .loader-bar {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin-top: 1rem;
            overflow: hidden;
            position: relative;
        }

        .loader-progress {
            position: absolute;
            left: 0; top: 0; height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--secondary), var(--primary));
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        /* 🔘 Action Buttons */
        .btn {
            display: block;
            width: 100%;
            padding: 1.2rem;
            border-radius: 18px;
            font-size: 1.1rem;
            font-weight: 800;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            border: none;
            outline: none;
            position: relative;
            overflow: hidden;
            display: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), #059669);
            color: #ffffff;
            box-shadow: 0 10px 25px var(--primary-glow);
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        .btn-primary::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.3) 50%, rgba(255,255,255,0) 100%);
            transform: skewX(-20deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }

        .btn-primary:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 15px 35px var(--primary-glow);
        }

        .btn-primary:active {
            transform: translateY(2px) scale(0.98);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            margin-top: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .footer-note {
            position: absolute;
            bottom: 2rem;
            color: rgba(255,255,255,0.3);
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        /* Device warning */
        .device-warning {
            display: none;
            color: #fbbf24;
            font-size: 0.9rem;
            margin-top: 1rem;
            background: rgba(251, 191, 36, 0.1);
            padding: 0.8rem;
            border-radius: 12px;
            border: 1px solid rgba(251, 191, 36, 0.2);
        }
    </style>
</head>
<body>

    <!-- Dynamic Background -->
    <div class="bg-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <!-- Main Card -->
    <div class="glass-card" id="card">
        <div class="icon-container">
            <div class="icon">💬</div>
        </div>

        <h1>Chat On</h1>
        <p class="subtitle">بوابتك للتواصل الذكي والمشفر</p>

        <div class="status-container">
            <div class="version-badge" id="versionBadge">v0.0.0</div>
            <p class="status-text" id="statusText">جاري الاتصال بقواعد البيانات واستخراج أحدث إصدار...</p>
            
            <div class="loader-bar" id="loaderBar">
                <div class="loader-progress" id="loaderProgress"></div>
            </div>
            
            <div class="device-warning" id="deviceWarning">
                ⚠️ يبدو أنك تتصفح من جهاز كمبيوتر أو أيفون. التطبيق مخصص لأجهزة <strong>أندرويد</strong> فقط.
            </div>
        </div>

        <a href="#" id="downloadBtn" class="btn btn-primary">تحميل مباشر للـ APK</a>
        <a href="https://github.com/waleeed-amr/apk.chat.on/releases" target="_blank" id="releasesBtn" class="btn btn-secondary">تصفح جميع الإصدارات</a>
    </div>

    <div class="footer-note">
        Secured by Firebase & GitHub Releases
    </div>

    <script type="module">
        // 3D Tilt Effect on Card
        const card = document.getElementById('card');
        document.addEventListener('mousemove', (e) => {
            const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
            card.style.transform = `translateY(0px) rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });
        
        // Reset tilt
        document.addEventListener('mouseleave', () => {
            card.style.transform = `translateY(0px) rotateY(0deg) rotateX(0deg)`;
        });

        // Elements
        const statusText = document.getElementById('statusText');
        const loaderProgress = document.getElementById('loaderProgress');
        const loaderBar = document.getElementById('loaderBar');
        const downloadBtn = document.getElementById('downloadBtn');
        const releasesBtn = document.getElementById('releasesBtn');
        const versionBadge = document.getElementById('versionBadge');
        const deviceWarning = document.getElementById('deviceWarning');

        // State
        let bestVersion = '';
        let finalDownloadUrl = window.FALLBACK_DOWNLOAD;
        
        const isAndroid = /android/i.test(navigator.userAgent);

        // Simulated Progress
        let progress = 0;
        const progressInterval = setInterval(() => {
            progress += Math.random() * 15;
            if (progress > 85) progress = 85; // Hold at 85% until real data arrives
            loaderProgress.style.width = `${progress}%`;
        }, 300);

        async function init() {
            try {
                // 1. Check GitHub API
                statusText.innerText = "جاري الفحص عبر سيرفرات GitHub...";
                let ghVersion = '';
                let ghUrl = '';
                
                try {
                    const ghRes = await fetch(`https://api.github.com/repos/${window.GITHUB_REPO}/releases/latest`);
                    if (ghRes.ok) {
                        const ghData = await ghRes.json();
                        ghVersion = ghData.tag_name ? ghData.tag_name.replace('v', '') : '';
                        const apkAsset = ghData.assets?.find(a => a.name.endsWith('.apk'));
                        if (apkAsset) ghUrl = apkAsset.browser_download_url;
                    }
                } catch(e) { console.log('GitHub fetch skipped or failed', e); }

                // 2. Check Firestore AppConfig (Admin Panel Fallback)
                statusText.innerText = "مزامنة البيانات مع لوحة تحكم Firebase...";
                let fsVersion = '';
                let fsUrl = '';
                
                try {
                    const docSnap = await window.getDoc(window.doc(window.db, 'AppConfig', 'latestVersion'));
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        fsVersion = data.versionName || '';
                        fsUrl = data.downloadUrl || data.directDownloadUrl || '';
                    }
                } catch(e) { console.log('Firestore fetch skipped or failed', e); }

                // 3. Compare and Decide
                if (ghVersion && fsVersion) {
                    // Compare versions
                    const vGH = parseFloat(ghVersion.replace(/\./g, ''));
                    const vFS = parseFloat(fsVersion.replace(/\./g, ''));
                    if (vGH >= vFS) {
                        bestVersion = ghVersion;
                        finalDownloadUrl = ghUrl || window.FALLBACK_DOWNLOAD;
                    } else {
                        bestVersion = fsVersion;
                        finalDownloadUrl = fsUrl || window.FALLBACK_DOWNLOAD;
                    }
                } else if (ghVersion) {
                    bestVersion = ghVersion;
                    finalDownloadUrl = ghUrl || window.FALLBACK_DOWNLOAD;
                } else if (fsVersion) {
                    bestVersion = fsVersion;
                    finalDownloadUrl = fsUrl || window.FALLBACK_DOWNLOAD;
                } else {
                    bestVersion = '11.00.00'; // Default fallback
                }

                completeLoading();

            } catch (err) {
                console.error("Critical error in fetching update:", err);
                statusText.innerHTML = "حدث خطأ في جلب البيانات، سيتم استخدام الرابط الافتراضي.";
                bestVersion = "الرسمي";
                completeLoading();
            }
        }

        function completeLoading() {
            clearInterval(progressInterval);
            loaderProgress.style.width = '100%';
            
            setTimeout(() => {
                loaderBar.style.display = 'none';
                
                versionBadge.innerText = `الإصدار ${bestVersion}`;
                versionBadge.style.display = 'inline-block';
                
                downloadBtn.href = finalDownloadUrl;
                downloadBtn.style.display = 'block';
                releasesBtn.style.display = 'block';

                if (isAndroid) {
                    statusText.innerHTML = `تم تأكيد التحديث! سيتم بدء التحميل تلقائياً الآن. <br> <span style="font-size:0.85rem; color:#94a3b8">إذا لم يبدأ التحميل، اضغط على الزر أدناه.</span>`;
                    setTimeout(() => {
                        window.location.href = finalDownloadUrl;
                    }, 1500);
                } else {
                    statusText.innerHTML = "التحديث الأخير جاهز للتحميل.";
                    deviceWarning.style.display = 'block';
                }
            }, 600);
        }

        // Run after 500ms to allow UI to render first
        setTimeout(init, 500);

    </script>
</body>
</html>
